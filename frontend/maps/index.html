  <style>
    .glass {
      background: rgba(0, 21, 36, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .glass-primary {
      background: rgba(0, 219, 240, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 219, 240, 0.4);
    }
    .pulse-aqua {
      box-shadow: 0 0 0 0 rgba(0, 219, 240, 0.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(0, 219, 240, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(0, 219, 240, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 219, 240, 0); }
    }
    .bioluminescent-glow {
      filter: drop-shadow(0 0 15px rgba(0, 219, 240, 0.6));
    }
    .grid-bg {
      background-image: linear-gradient(rgba(0, 219, 240, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 219, 240, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
